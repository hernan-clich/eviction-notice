# Render Blueprint — Eviction Notice.
#
# Active: the skill only — the x402-gated Solvency-Aware Sizing endpoint, on Render's
# FREE web tier (no card required). It sleeps after 15 min idle and cold-starts on the
# next request, which is fine for an on-demand skill.
#
# The agent worker is NOT in the active Blueprint: Render has no free always-on worker,
# and we don't want to force a paid plan. For dev + the validation run, the worker runs
# locally (docs/deploy.md §B). For go-live we either (a) uncomment the worker block below
# (paid Starter) or (b) run it $0 via tick-on-cron — see docs/deploy.md.
#
# Secrets (sync: false) are set in the Render dashboard, never committed. See docs/deploy.md.
services:
  - type: web
    name: eviction-notice-skill
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm --filter skill start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: X402_NETWORK
        value: bsc
      - key: X402_ASSET
        value: USDT-BSC
      - key: X402_PRICE_ATOMIC
        value: '10000000000000000' # $0.01 at 18 decimals
      - key: X402_PAY_TO
        sync: false # treasury address; pinned for real in #14

  # --- Go-live worker (PAID — Render Starter, always-on). Uncomment at #19/#20, or
  #     prefer the $0 tick-on-cron route in docs/deploy.md. Adding this to the active
  #     Blueprint forces a card on file, so it stays commented until go-live. ---
