# Render Blueprint — Eviction Notice.
#
#   - skill  : x402-gated Solvency-Aware Sizing endpoint (paid Starter, always-on
#              so the worker's pay-to-think calls never hit a cold start).
#   - worker : the always-on agent loop (paid Starter). EXECUTION_MODE=live → it
#              signs real BSC swaps via TWAK; render-start.sh provisions the wallet
#              from secrets on boot. Only ONE worker may run per agent_id at a time.
#
# Secrets (sync: false) are set in the Render dashboard, never committed. See docs/deploy.md.
services:
  - type: web
    name: eviction-notice-skill
    runtime: node
    plan: starter # always-on (no spin-down) so x402 calls never cold-start
    region: oregon
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile
    startCommand: pnpm --filter skill start
    healthCheckPath: /healthz
    # Only redeploy when the skill (or shared) code changes — not on web/docs merges.
    buildFilter:
      paths:
        - apps/skill/**
        - packages/shared/**
        - pnpm-lock.yaml
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: X402_NETWORK
        value: bsc
      - key: X402_ASSET
        value: USDT-BSC
      - key: X402_PRICE_ATOMIC
        value: '10000000000000000' # $0.01 at 18 decimals
      - key: X402_PAY_TO
        sync: false # treasury address; pinned for real in #14

  - type: worker
    name: eviction-notice-worker
    runtime: node
    plan: starter # paid, always-on
    region: oregon
    rootDir: .
    # Install the TWAK CLI globally so `twak` is on PATH for live swaps.
    buildCommand: corepack enable && pnpm install --frozen-lockfile && npm install -g @trustwallet/cli
    # Provision ~/.twak from secrets, then run the loop.
    startCommand: bash apps/worker/render-start.sh
    # Only redeploy when worker (or shared) code changes — a dashboard merge must not
    # restart the live trading loop (each restart costs a tick's rent + re-evaluates).
    buildFilter:
      paths:
        - apps/worker/**
        - packages/shared/**
        - pnpm-lock.yaml
        - render.yaml
    envVars:
      - key: NODE_VERSION
        value: '22'
      - key: EXECUTION_MODE
        value: live
      - key: AGENT_ID
        value: agent-0
      - key: SEED_USD
        value: '5'
      - key: RENT_PER_HOUR_USD
        value: '0.07'
      - key: TICK_INTERVAL_MS
        value: '1800000' # 30 min
      - key: MAX_TICKS
        value: '0' # run forever
      - key: BSC_NETWORK
        value: mainnet
      - key: TWAK_SLIPPAGE_PCT
        value: '1'
      # Secrets — set in the Render dashboard (never committed):
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: CMC_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SKILL_URL
        sync: false # the deployed skill's URL
      - key: X402_PAYER
        sync: false
      - key: TWAK_WALLET_PASSWORD
        sync: false
      - key: TWAK_WALLET_JSON_B64
        sync: false # base64 -i ~/.twak/wallet.json
      - key: TWAK_CREDENTIALS_JSON_B64
        sync: false # base64 -i ~/.twak/credentials.json
